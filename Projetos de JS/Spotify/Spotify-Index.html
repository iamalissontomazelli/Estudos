<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link css -->
    <link rel="stylesheet" href="./Spotify-Css/Spotify-Style.css">
    <!-- Font Awesome Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Spotify | by Alisson Tomazelli</title>
</head>

<body>
    <img src="./Spotify-Img/Capa.jpeg" alt="#">
    <div class="descricao">
        <h2>Nome da Música</h2>
        <i>Alisson Tomazelli</i>
    </div>
    <!-- Duração Inicio -->
    <div class="duracao">
        <div class="barra">
            <progress value="0" max="1"></progress>
            <div class="ponto"></div>
        </div>
        <!-- marcação de tempo -->
        <div class="tempo">
            <p class="inicio">0:00</p>
            <p class="fim">3:40</p>
        </div>
    </div>
    <!-- Duração FIM  -->
    <!-- Play/Pause Inicio  -->
    <div class="player">
        <i class="fas fa-step-backward setas anterior"></i>
        <i class="fas fa-play-circle botao-play"></i>
        <i class="fas fa-pause-circle botao-pause"></i>
        <i class="fas fa-step-forward setas proximo"></i>
    </div>
    <!-- Play/Pause Fim -->
    <!-- Audio Link -->
    <audio src="./Spotify-Music/Akiaura - sleepwalker (PHONK remix).mp3"></audio>
    <!-- link do JavaScript -->
    <script src="./Spotify-JS/Spotify-JS.js"></script>
</body>

</html>
